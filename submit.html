<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>submitting - trove</title>
  <style>
    body { font-family: system-ui, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f5f5f5; color: #333; }
    .msg { text-align: center; font-size: 16px; }
    .err { color: #c22; }
  </style>
</head>
<body>
  <div class="msg" id="status">Submitting...</div>
  <script>
    (async () => {
      const p = new URLSearchParams(location.search);
      const status = document.getElementById('status');
      const url = p.get('url');
      const username = p.get('u');
      const password = p.get('p');
      if (!url || !username || !password) {
        status.textContent = 'Missing parameters';
        status.className = 'msg err';
        return;
      }
      try {
        const resp = await fetch('/.netlify/functions/submit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            url,
            title: p.get('title') || undefined,
            tags: p.get('tags') || '',
            notes: p.get('notes') || '',
            username,
            password,
          }),
        });
        const result = await resp.json();
        if (resp.ok) {
          status.textContent = 'Added! Closing...';
          setTimeout(() => window.close(), 800);
          // If window.close() is blocked (not opened by script), show message
          setTimeout(() => { status.textContent = 'Added! You can close this tab.'; }, 1200);
        } else {
          status.textContent = result.error || 'Failed';
          status.className = 'msg err';
        }
      } catch (e) {
        status.textContent = 'Network error';
        status.className = 'msg err';
      }
    })();
  </script>
</body>
</html>
