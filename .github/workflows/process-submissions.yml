name: Process Link Submissions

on:
  issues:
    types: [labeled]

jobs:
  process:
    if: contains(github.event.issue.labels.*.name, 'submission')
    runs-on: ubuntu-latest
    concurrency:
      group: process-submissions
      cancel-in-progress: false
    permissions:
      contents: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch trove-log.jsonl from links branch
        run: |
          git fetch origin links
          git show origin/links:trove-log.jsonl > trove-log.jsonl

      - name: Process submissions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python process_issues.py

      - name: Commit and push to links branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BLOB=$(git hash-object -w trove-log.jsonl)
          TREE=$(printf "100644 blob %s\ttrove-log.jsonl\n" "$BLOB" | git mktree)
          PARENT=$(git rev-parse origin/links)
          COMMIT=$(git commit-tree "$TREE" -p "$PARENT" -m "Add links from issue submissions")
          git update-ref refs/heads/links "$COMMIT"
          git push origin links
