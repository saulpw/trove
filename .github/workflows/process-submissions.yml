name: Process Link Submissions

on:
  issues:
    types: [labeled]

jobs:
  process:
    if: contains(github.event.issue.labels.*.name, 'submission')
    runs-on: ubuntu-latest
    concurrency:
      group: process-submissions
      cancel-in-progress: false
    permissions:
      contents: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up links worktree
        run: |
          git fetch origin links
          git worktree add .links links

      - name: Process submissions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python process_issues.py

      - name: Commit and push to links branch
        run: |
          cd .links
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cd ..
          make push-links MSG="Add links from issue submissions"
          cd .links && git push origin links

      - name: Trigger production rebuild
        run: curl -sS -X POST ${{ secrets.NETLIFY_BUILD_HOOK }}
