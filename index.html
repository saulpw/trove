<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>trove</title>
  <link rel="stylesheet" href="/style.css?BUILD_TIMESTAMP">
</head>
<body>
  <header>
    <h1><a href="/">trove</a></h1>
    <nav>
      <a href="/help.html">help</a>
    </nav>
    <div id="auth-container">
      <div id="auth-menu" style="display:none;">
        <span id="auth-user"></span>
        <div id="auth-dropdown">
          <span onclick="signOut()">Sign out</span>
        </div>
      </div>
      <button id="auth-btn" onclick="showSignIn()">Sign in</button>
    </div>
  </header>

  <div id="signin-form" style="display:none;">
    <input type="text" id="auth-username" placeholder="Username" />
    <div class="password-wrap">
      <input type="password" id="auth-password" placeholder="Password" />
      <span class="password-toggle" onclick="togglePasswordVisibility()">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
          <path class="eye-open" d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle class="eye-open" cx="12" cy="12" r="3"/>
          <line class="eye-shut" x1="1" y1="1" x2="23" y2="23" style="display:none"/>
        </svg>
      </span>
    </div>
    <button onclick="handleSignIn()">Sign in</button>
    <span id="auth-status"></span>
  </div>

  <div id="content-wrapper">
    <div id="tag-sidebar"></div>
    <div id="main-content">
      <div id="add-form">
        <input type="text" id="link-url" placeholder="https://..." />
        <input type="text" id="link-tags" placeholder="Tags (space-separated)" />
        <input type="text" id="link-notes" placeholder="Notes (optional)" />
        <button id="submit-btn" onclick="submitLink()">Add</button>
        <span id="submit-status"></span>
      </div>

      <div id="filter-bar">
        <div id="link-count"></div>
        <div id="sort-controls" style="display: none;">
          Sort: <select id="sort-select" onchange="applySort()">
            <option value="newest">Newest first</option>
            <option value="oldest">Oldest first</option>
            <option value="alpha">Alphabetical</option>
            <option value="random">Random</option>
          </select>
        </div>
        <div id="time-filter-controls" style="display: none;">
          Time period: <select id="time-filter-select" onchange="filterAndRender()">
            <option value="all">All time</option>
            <option value="day">Last day</option>
            <option value="week">Last week</option>
            <option value="month">Last month</option>
            <option value="year">Last year</option>
          </select>
        </div>
      </div>
      <div id="links"></div>
    </div>
  </div>

  <footer>
    <div>a <a href="https://saul.pw">saul.pw</a> project | <a href="/privacy">privacy policy</a> | bookmarklet: <a id="bookmarklet" href="#">add to trove</a></div>
    <div id="version">v0.20</div>
  </footer>

  <!-- Main frontend code -->
  <script src="/frontend.js"></script>
</body>
</html>
