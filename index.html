<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>trove</title>
  <link rel="stylesheet" href="/style.css?BUILD_TIMESTAMP">
</head>
<body>
  <header>
    <h1><a href="/">trove</a></h1>
    <div id="auth-container">
      Drag to bookmarks: <a id="bookmarklet" href="#">add to trove</a>
      <a href="/help">help</a>
      <a id="auth-signout" onclick="signOut()" style="display:none;">logout</a>
      <a id="auth-btn" onclick="showSignIn(true)">login</a>
    </div>
  </header>

  <div id="signin-overlay" style="display:none;">
    <div id="signin-panel">
      <div class="signin-header">
        <strong>Sign in</strong>
        <button class="signin-close" onclick="showSignIn(false)">&times;</button>
      </div>
      <div class="signin-body">
        <label for="auth-username">Username</label>
        <input type="text" id="auth-username" placeholder="Username" />
        <label for="auth-password">Password</label>
        <div class="password-wrap">
          <input type="password" id="auth-password" placeholder="Password" />
          <span class="password-toggle" onclick="togglePasswordVisibility()">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
              <path class="eye-open" d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle class="eye-open" cx="12" cy="12" r="3"/>
              <line class="eye-shut" x1="1" y1="1" x2="23" y2="23" style="display:none"/>
            </svg>
          </span>
        </div>
        <button onclick="handleSignIn()">Sign in</button>
        <div id="auth-status"></div>
      </div>
    </div>
  </div>

  <div id="edit-tag-overlay" style="display:none;">
    <div id="edit-tag-panel">
      <div class="signin-header">
        <strong>Edit tag</strong>
        <button class="signin-close" id="edit-tag-close">&times;</button>
      </div>
      <div class="signin-body">
        <label for="edit-tag-name">Tag name</label>
        <input type="text" id="edit-tag-name" />
        <label for="edit-tag-desc">Description</label>
        <textarea id="edit-tag-desc" rows="3" placeholder="Optional description"></textarea>
        <div class="edit-tag-buttons">
          <button id="edit-tag-save">Save</button>
          <button id="edit-tag-cancel">Cancel</button>
        </div>
      </div>
    </div>
  </div>

  <div id="content-wrapper">
    <div id="tag-sidebar"></div>
    <div id="main-content">
      <div id="filter-bar">
        <input type="text" id="search-input" placeholder="Search titles, tags, notes..." oninput="filterAndRender()" />
        <div id="link-count"></div>
        <div id="sort-controls" style="display: none;">
          Sort: <select id="sort-select" onchange="applySort()">
            <option value="newest">Newest first</option>
            <option value="oldest">Oldest first</option>
            <option value="alpha">Alphabetical</option>
            <option value="random">Random</option>
          </select>
        </div>
        <div id="time-filter-controls" style="display: none;">
          Time period: <select id="time-filter-select" onchange="filterAndRender()">
            <option value="all">All time</option>
            <option value="day">Last day</option>
            <option value="week">Last week</option>
            <option value="month">Last month</option>
            <option value="year">Last year</option>
          </select>
        </div>
      </div>
      <div id="links"></div>
    </div>
  </div>

  <footer>
    <div>a <a href="https://saul.pw">saul.pw</a> project | <a href="/privacy">privacy policy</a></div>
    <div id="version">v0.36</div>
  </footer>

  <!-- Main frontend code -->
  <script src="/frontend.js"></script>
</body>
</html>
