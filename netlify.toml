[build]
  command = "make build"
  publish = "_build"

[functions]
  directory = "netlify/functions"

[[headers]]
  for = "/trove.jsonl"
  [headers.values]
    Cache-Control = "max-age=60"

[[headers]]
  for = "/tags.json"
  [headers.values]
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/bookmarklet.js"
  [headers.values]
    Access-Control-Allow-Origin = "*"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
